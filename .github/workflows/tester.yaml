name: Build Tester

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-build:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: go mod tidy

      - name: Run Vet
        run: go vet ./...

      - name: Build for Windows
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -o /dev/null main.go

      - name: Build for Linux (AMD64)
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -o /dev/null main.go

      - name: Build for macOS (Silicon)
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -o /dev/null main.go
